<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugSlayer — Autonomous AI Debugger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<style>
:root {
  --bg:#0a0a0a;--bg1:#111111;--bg2:#161616;--bg3:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.13);
  --text:#ededed;--text2:#888;--text3:#555;
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,0.08);--accent-border:rgba(232,255,71,0.25);
  --red:#ff4444;--green:#00d084;--blue:#4da6ff;
  --radius:10px;--font-mono:'Geist Mono',monospace;--font-body:'DM Sans',sans-serif;--font-display:'Instrument Serif',serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:0.025;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:relative;z-index:10;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo-text{font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--text);letter-spacing:-0.3px;}
.logo-sub{font-family:var(--font-display);font-style:italic;font-size:11px;color:var(--text3);margin-left:-4px;}
.topbar-divider{width:1px;height:20px;background:var(--border);}
.lang-tabs{display:flex;gap:2px;}
.lang-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-family:var(--font-mono);color:var(--text3);cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:none;}
.lang-tab:hover{color:var(--text2);background:var(--bg3);}
.lang-tab.active{color:var(--accent);background:var(--accent-dim);border-color:var(--accent-border);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.status-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-family:var(--font-mono);background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.status-dot.running{background:var(--accent);animation:blink 0.8s infinite;}
.status-dot.success{background:var(--green);}
.status-dot.error{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.run-btn{display:flex;align-items:center;gap:8px;padding:7px 18px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;transition:all 0.15s;letter-spacing:-0.2px;}
.run-btn:hover{background:#f0ff6a;transform:translateY(-1px);box-shadow:0 4px 20px rgba(232,255,71,0.3);}
.run-btn:active{transform:translateY(0);}
.run-btn svg{width:13px;height:13px;}
.main{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px);}
.left-panel{display:flex;flex-direction:column;border-right:1px solid var(--border);}
.editor-section{flex:1;display:flex;flex-direction:column;border-bottom:1px solid var(--border);min-height:0;}
.editor-section.test-section{flex:0 0 220px;border-bottom:none;}
.section-label{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:11px;font-family:var(--font-mono);color:var(--text3);letter-spacing:0.05em;}
.section-label-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);}
.editor-wrap{flex:1;overflow:hidden;}
.CodeMirror{height:100% !important;background:var(--bg) !important;color:#c9d1d9 !important;font-family:var(--font-mono) !important;font-size:12.5px !important;line-height:1.7 !important;}
.CodeMirror-gutters{background:var(--bg1) !important;border-right:1px solid var(--border) !important;}
.CodeMirror-linenumber{color:var(--text3) !important;font-size:11px !important;}
.CodeMirror-cursor{border-left:1.5px solid var(--accent) !important;}
.CodeMirror-selected{background:rgba(232,255,71,0.08) !important;}
.cm-keyword{color:#ff7b72 !important;}
.cm-string{color:#a5d6ff !important;}
.cm-comment{color:#484f58 !important;font-style:italic !important;}
.cm-number{color:#79c0ff !important;}
.cm-def{color:#d2a8ff !important;}
.cm-variable{color:#c9d1d9 !important;}
.cm-operator{color:#ff7b72 !important;}
.right-panel{display:flex;flex-direction:column;background:var(--bg);}
.log-header{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:11px;font-family:var(--font-mono);color:var(--text3);letter-spacing:0.05em;background:var(--bg1);}
.log-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;min-height:0;}
.log-body::-webkit-scrollbar{width:4px;}
.log-body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
.log-entry{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border-radius:8px;font-size:12px;font-family:var(--font-mono);line-height:1.5;animation:fadeSlide 0.2s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.log-entry.start{background:rgba(77,166,255,0.06);border:1px solid rgba(77,166,255,0.15);color:var(--blue);}
.log-entry.attempt{background:rgba(232,255,71,0.04);border:1px solid rgba(232,255,71,0.1);color:#c5cc5a;}
.log-entry.fail{background:rgba(255,68,68,0.05);border:1px solid rgba(255,68,68,0.12);color:#ff8080;}
.log-entry.ai{background:rgba(161,100,255,0.05);border:1px solid rgba(161,100,255,0.12);color:#c49aff;}
.log-entry.success{background:rgba(0,208,132,0.06);border:1px solid rgba(0,208,132,0.2);color:var(--green);}
.log-entry.error{background:rgba(255,68,68,0.06);border:1px solid rgba(255,68,68,0.15);color:var(--red);}
.log-icon{flex-shrink:0;margin-top:1px;font-size:11px;}
.log-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);}
.log-empty-title{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--text3);}
.log-empty-sub{font-size:12px;font-family:var(--font-mono);color:var(--text3);opacity:0.6;}
.result-panel{border-top:1px solid var(--border);background:var(--bg1);flex:0 0 auto;}
.result-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);}
.result-label{font-size:11px;font-family:var(--font-mono);color:var(--text3);letter-spacing:0.05em;}
.result-badge{font-size:10px;font-family:var(--font-mono);padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.result-badge.pass{background:rgba(0,208,132,0.1);color:var(--green);border-color:rgba(0,208,132,0.2);}
.result-badge.fail{background:rgba(255,68,68,0.1);color:var(--red);border-color:rgba(255,68,68,0.2);}
.result-code{padding:14px 16px;font-family:var(--font-mono);font-size:12px;color:var(--green);line-height:1.7;white-space:pre-wrap;overflow-y:auto;max-height:180px;background:var(--bg);margin:10px;border-radius:8px;border:1px solid var(--border);}
.result-code::-webkit-scrollbar{width:3px;}
.result-code::-webkit-scrollbar-thumb{background:var(--bg3);}
.result-placeholder{color:var(--text3);font-size:12px;font-family:var(--font-mono);}
.attempt-counter{margin-left:auto;display:flex;gap:4px;align-items:center;}
.attempt-pip{width:20px;height:4px;border-radius:2px;background:var(--bg3);transition:all 0.3s;}
.attempt-pip.done{background:var(--accent);}
.attempt-pip.fail{background:var(--red);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">BugSlayer</span>
  </div>
  <div class="topbar-divider"></div>
  <div class="lang-tabs">
    <button class="lang-tab active" onclick="setLang('python',this)">python</button>
    <button class="lang-tab" onclick="setLang('cpp',this)">c++</button>
    <button class="lang-tab" onclick="setLang('java',this)">java</button>
  </div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">idle</span>
    </div>
    <button class="run-btn" onclick="runDebugger()">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5v11l10-5.5L3 2.5z"/></svg>
      Run BugSlayer
    </button>
  </div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="editor-section">
      <div class="section-label">
        <div class="section-label-dot" style="background:#ff7b72"></div>
        broken_code
        <div class="attempt-counter">
          <div class="attempt-pip" id="pip1"></div>
          <div class="attempt-pip" id="pip2"></div>
          <div class="attempt-pip" id="pip3"></div>
          <div class="attempt-pip" id="pip4"></div>
          <div class="attempt-pip" id="pip5"></div>
        </div>
      </div>
      <div class="editor-wrap"><textarea id="code-editor"></textarea></div>
    </div>
    <div class="editor-section test-section">
      <div class="section-label">
        <div class="section-label-dot" style="background:#4da6ff"></div>
        test_suite
      </div>
      <div class="editor-wrap"><textarea id="test-editor"></textarea></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="log-header">
      <div class="section-label-dot"></div>
      agent_log
      <span style="margin-left:auto;font-size:10px;opacity:0.5">live stream</span>
    </div>
    <div class="log-body" id="log-body">
      <div class="log-empty" id="log-empty">
        <div style="font-size:32px;opacity:0.15">⚡</div>
        <div class="log-empty-title">Ready to slay bugs</div>
        <div class="log-empty-sub">paste code → click run → watch the magic</div>
      </div>
    </div>
    <div class="result-panel">
      <div class="result-header">
        <span class="result-label">fixed_output</span>
        <span class="result-badge" id="result-badge">awaiting</span>
      </div>
      <div class="result-code" id="result-code"><span class="result-placeholder">// fixed code appears here after agent completes...</span></div>
    </div>
  </div>
</div>

<script>
const samples={
  python:{code:`def add(a, b):\n    return a - b\n\ndef multiply(a, b):\n    return a + b\n\ndef divide(a, b):\n    return b / a`,test:`def test_add():\n    assert add(2, 3) == 5\n\ndef test_multiply():\n    assert multiply(3, 4) == 12\n\ndef test_divide():\n    assert divide(10, 2) == 5.0`},
  cpp:{code:`#include <gtest/gtest.h>\n\nint add(int a, int b) {\n    return a - b;\n}\n\nTEST(AddTest, Basic) {\n    EXPECT_EQ(add(2, 3), 5);\n    EXPECT_EQ(add(0, 0), 0);\n}`,test:``},
  java:{code:`public class Solution {\n    public static int add(int a, int b) {\n        return a - b;\n    }\n}`,test:`import org.junit.jupiter.api.Test;\nimport static org.junit.jupiter.api.Assertions.*;\n\nclass TestSolution {\n    @Test\n    void testAdd() {\n        assertEquals(5, Solution.add(2, 3));\n    }\n}`}
}

let codeEditor,testEditor,currentLang='python'

window.onload=()=>{
  codeEditor=CodeMirror.fromTextArea(document.getElementById('code-editor'),{mode:'python',lineNumbers:true,indentUnit:4,tabSize:4,theme:'default'})
  testEditor=CodeMirror.fromTextArea(document.getElementById('test-editor'),{mode:'python',lineNumbers:true,indentUnit:4,tabSize:4,theme:'default'})
  codeEditor.setValue(samples.python.code)
  testEditor.setValue(samples.python.test)
  codeEditor.setSize('100%','100%')
  testEditor.setSize('100%','100%')
}

function setLang(lang,btn){
  currentLang=lang
  document.querySelectorAll('.lang-tab').forEach(t=>t.classList.remove('active'))
  btn.classList.add('active')
  codeEditor.setValue(samples[lang].code)
  testEditor.setValue(samples[lang].test)
  const mode=lang==='python'?'python':'text/x-c++src'
  codeEditor.setOption('mode',mode)
  testEditor.setOption('mode',mode)
}

function setStatus(type,text){
  document.getElementById('status-dot').className=`status-dot ${type}`
  document.getElementById('status-text').textContent=text
}

function setPip(i,state){
  const p=document.getElementById(`pip${i}`)
  if(p)p.className=`attempt-pip ${state}`
}

function addLog(message,type,icon){
  const empty=document.getElementById('log-empty')
  if(empty)empty.remove()
  const log=document.getElementById('log-body')
  const entry=document.createElement('div')
  entry.className=`log-entry ${type}`
  entry.innerHTML=`<span class="log-icon">${icon}</span><span>${message}</span>`
  log.appendChild(entry)
  log.scrollTop=log.scrollHeight
}

async function runDebugger(){
  const code=codeEditor.getValue().trim()
  const testCode=testEditor.getValue().trim()
  if(!code){alert('Paste some broken code first!');return}
  document.getElementById('log-body').innerHTML=''
  document.getElementById('result-code').innerHTML='<span class="result-placeholder">// agent working...</span>'
  document.getElementById('result-badge').className='result-badge'
  document.getElementById('result-badge').textContent='running'
  for(let i=1;i<=5;i++)setPip(i,'')
  setStatus('running','running')
  try{
    const response=await fetch('http://localhost:8000/debug',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,test_code:testCode,language:currentLang,max_attempts:5})
    })
    const reader=response.body.getReader()
    const decoder=new TextDecoder()
    while(true){
      const{done,value}=await reader.read()
      if(done)break
      const lines=decoder.decode(value).split('\n').filter(l=>l.startsWith('data: '))
      for(const line of lines){
        try{
          const data=JSON.parse(line.replace('data: ',''))
          if(data.type==='start')addLog(`BugSlayer started · language: ${data.language}`,'start','◆')
          else if(data.type==='attempt'){setPip(data.attempt,'done');addLog(`attempt ${data.attempt}/${data.max} · running tests in Docker sandbox`,'attempt','▸')}
          else if(data.type==='test_failed'){setPip(parseInt(data.attempt),'fail');addLog(`tests failed · ${data.output.split('\n').filter(l=>l.trim()).slice(-2).join(' · ')}`,'fail','✕');addLog('sending error context to Gemini AI...','ai','◎')}
          else if(data.type==='ai_fix')addLog(`AI generated fix #${data.attempt} · testing now`,'ai','✦')
          else if(data.type==='success'){addLog(`all tests passed · fixed in ${data.attempts} attempt(s)`,'success','✓');document.getElementById('result-code').textContent=data.fixed_code;document.getElementById('result-badge').className='result-badge pass';document.getElementById('result-badge').textContent=`passed · ${data.attempts} attempt(s)`;setStatus('success',`fixed in ${data.attempts} attempt(s)`)}
          else if(data.type==='failed'){addLog('could not fix after max attempts','error','✕');document.getElementById('result-badge').className='result-badge fail';document.getElementById('result-badge').textContent='failed';setStatus('error','failed')}
        }catch(e){}
      }
    }
  }catch(e){
    addLog('connection error · is the API running on port 8000?','error','✕')
    setStatus('error','connection error')
  }
}
</script>
</body>
</html>
