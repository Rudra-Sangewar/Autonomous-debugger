<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugSlayer — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg1:#111111;--bg3:#1c1c1c;
  --border:rgba(255,255,255,0.07);
  --text:#ededed;--text2:#888;--text3:#555;
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,0.08);--accent-border:rgba(232,255,71,0.25);
  --red:#ff4444;--green:#00d084;--blue:#4da6ff;
  --font-mono:'Geist Mono',monospace;--font-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo-text{font-family:var(--font-mono);font-size:14px;font-weight:500;}
.nav-link{font-size:12px;font-family:var(--font-mono);color:var(--text3);text-decoration:none;padding:4px 12px;border-radius:6px;border:1px solid transparent;transition:all 0.15s;}
.nav-link:hover{color:var(--text2);background:var(--bg3);}
.nav-link.active{color:var(--accent);background:var(--accent-dim);border-color:var(--accent-border);}
.page{max-width:1100px;margin:0 auto;padding:32px 24px;}
.page-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text3);font-family:var(--font-mono);margin-bottom:32px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:20px 20px 16px;}
.stat-value{font-size:32px;font-weight:500;font-family:var(--font-mono);color:var(--text);line-height:1;}
.stat-unit{font-size:14px;color:var(--text3);margin-left:2px;}
.stat-label{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-top:8px;letter-spacing:0.05em;}
.stat-card.highlight{border-color:var(--accent-border);background:var(--accent-dim);}
.stat-card.highlight .stat-value{color:var(--accent);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.panel{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.panel-header{padding:12px 20px;border-bottom:1px solid var(--border);font-size:11px;font-family:var(--font-mono);color:var(--text3);letter-spacing:0.05em;}
.panel-body{padding:20px;}
.lang-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.lang-row:last-child{margin-bottom:0;}
.lang-name{font-family:var(--font-mono);font-size:12px;color:var(--text2);width:60px;}
.lang-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.lang-bar{height:100%;border-radius:3px;transition:width 1s ease;}
.lang-pct{font-family:var(--font-mono);font-size:12px;color:var(--text2);width:40px;text-align:right;}
.lang-meta{font-family:var(--font-mono);font-size:11px;color:var(--text3);width:80px;text-align:right;}
.run-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.run-row:last-child{border-bottom:none;}
.run-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.run-lang{font-family:var(--font-mono);font-size:11px;color:var(--text2);width:55px;}
.run-status{font-family:var(--font-mono);font-size:11px;flex:1;}
.run-status.pass{color:var(--green);}
.run-status.fail{color:var(--red);}
.run-meta{font-family:var(--font-mono);font-size:11px;color:var(--text3);}
.run-time{font-family:var(--font-mono);font-size:11px;color:var(--text3);width:50px;text-align:right;}
.loading{text-align:center;padding:60px;color:var(--text3);font-family:var(--font-mono);font-size:13px;}
.refresh-btn{margin-left:auto;padding:5px 14px;border-radius:6px;font-size:12px;font-family:var(--font-mono);color:var(--text3);cursor:pointer;border:1px solid var(--border);background:none;transition:all 0.15s;}
.refresh-btn:hover{color:var(--text);background:var(--bg3);}
.big-bar-wrap{margin-bottom:20px;}
.big-bar-label{display:flex;justify-content:space-between;font-size:12px;font-family:var(--font-mono);color:var(--text3);margin-bottom:6px;}
.big-bar-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.big-bar-fill{height:100%;border-radius:4px;background:var(--green);transition:width 1.2s ease;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">BugSlayer</span>
  </div>
  <a href="/app" class="nav-link">debugger</a>
  <a href="stats.html" class="nav-link active">stats</a>
  <button class="refresh-btn" onclick="loadStats()">↻ refresh</button>
</div>

<div class="page" id="page">
  <div class="loading">loading stats...</div>
</div>

<script>
const API = ''

async function loadStats() {
  try {
    const res = await fetch(`${API}/stats`)
    const d = await res.json()
    render(d)
  } catch(e) {
    document.getElementById('page').innerHTML = `<div class="loading">could not connect to API · is it running on port 8000?</div>`
  }
}

function render(d) {
  const page = document.getElementById('page')
  page.innerHTML = `
    <div class="page-title">BugSlayer Performance</div>
    <div class="page-sub">live benchmark data · ${d.total_runs} total runs</div>

    <div class="grid-4">
      <div class="stat-card highlight">
        <div class="stat-value">${d.success_rate}<span class="stat-unit">%</span></div>
        <div class="stat-label">SUCCESS RATE</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${d.avg_attempts}</div>
        <div class="stat-label">AVG ATTEMPTS</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${d.avg_time}<span class="stat-unit">s</span></div>
        <div class="stat-label">AVG FIX TIME</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${d.languages_supported}</div>
        <div class="stat-label">LANGUAGES</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-header">success rate by language</div>
        <div class="panel-body">
          ${Object.entries(d.language_stats).map(([lang, s]) => `
            <div class="big-bar-wrap">
              <div class="big-bar-label">
                <span style="color:var(--text);font-weight:500">${lang}</span>
                <span>${s.success_rate}% · ${s.runs} runs · avg ${s.avg_attempts} attempts</span>
              </div>
              <div class="big-bar-track">
                <div class="big-bar-fill" style="width:${s.success_rate}%;background:${lang==='python'?'var(--accent)':lang==='cpp'?'var(--blue)':'var(--green)'}"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">recent runs</div>
        <div class="panel-body">
          ${d.recent_runs.map(r => `
            <div class="run-row">
              <div class="run-dot" style="background:${r.success?'var(--green)':'var(--red)'}"></div>
              <div class="run-lang">${r.language}</div>
              <div class="run-status ${r.success?'pass':'fail'}">${r.success ? `fixed in ${r.attempts} attempt${r.attempts>1?'s':''}` : 'failed after 5 attempts'}</div>
              <div class="run-time">${r.time}s</div>
              <div class="run-meta">${r.timestamp}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">language breakdown</div>
      <div class="panel-body">
        ${Object.entries(d.language_stats).map(([lang, s]) => `
          <div class="lang-row">
            <div class="lang-name">${lang}</div>
            <div class="lang-bar-wrap">
              <div class="lang-bar" style="width:${s.success_rate}%;background:${lang==='python'?'var(--accent)':lang==='cpp'?'var(--blue)':'var(--green)'}"></div>
            </div>
            <div class="lang-pct">${s.success_rate}%</div>
            <div class="lang-meta">${s.runs} runs</div>
          </div>
        `).join('')}
      </div>
    </div>
  `
}

loadStats()
</script>
</body>
</html>
